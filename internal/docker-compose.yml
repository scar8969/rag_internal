version: '3.8'

services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
      - ./documents:/app/documents
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - DEBUG=false
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_URL=sqlite:///./data/app.db
      - CHROMA_PERSIST_DIR=/app/data/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rag-network

networks:
  rag-network:
    name: rag-network
    driver: bridge
